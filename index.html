<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Top Gear Test</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #111;
        /* "manipulation" só desabilita o double-tap-to-zoom, mas AINDA permite pinça — "none"
           desabilita os dois. A página não precisa de pan/scroll nativo (é um jogo em tela cheia
           fixa), então não perde nada relevante. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #app { width: 100%; height: 100%; touch-action: none; }
      canvas { display: block; touch-action: none; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
