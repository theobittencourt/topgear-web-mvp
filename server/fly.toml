app = "topgear-web-mvp"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # NÃO deixa a máquina hibernar por inatividade — é exatamente o problema que tivemos na
  # Railway (modo "serverless" matando conexões WebSocket no meio de uma corrida)
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
